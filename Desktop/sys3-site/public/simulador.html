<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Wi-Fi - Sys3 Telecom</title>
    <style>
        /* --- VARIÁVEIS DE MARCA SYS3 --- */
        :root {
            --sys-orange: #f26522; 
            --sys-orange-hover: #d9551a;
            --sys-orange-light: #fef0e9;
            --sys-dark: #111111;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: transparent; /* Alterado para mesclar com o site */
            color: var(--sys-dark);
            margin: 0; 
            padding: 10px;
            overflow-x: hidden;
        }

        /* --- TELA DE BOAS VINDAS (MODAL) --- */
        #setup-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(17, 17, 17, 0.85); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 16px;
            width: 90%; max-width: 420px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center; border-top: 6px solid var(--sys-orange);
        }
        .modal-content img { height: 50px; margin-bottom: 20px; }
        .modal-content h3 { margin: 0 0 10px 0; color: #333; font-size: 20px; }
        .modal-content p { color: #666; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-large {
            padding: 14px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px;
            cursor: pointer; transition: 0.2s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--sys-orange); color: #fff; box-shadow: 0 4px 10px rgba(242, 101, 34, 0.3); }
        .btn-primary:hover { background: var(--sys-orange-hover); transform: translateY(-2px); }
        .btn-secondary { background: #e2e8f0; color: #444; }
        .btn-secondary:hover { background: #cbd5e1; }

        /* --- CABEÇALHO E FERRAMENTAS --- */
        #toolbar {
            width: 100%; max-width: 800px; margin-bottom: 15px; background: #fff; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column;
            user-select: none; border-top: 4px solid var(--sys-orange);
        }
        .toolbar-row { 
            display: flex; align-items: center; flex-wrap: wrap; 
            padding: 10px; border-bottom: 1px solid #eee; gap: 8px; justify-content: center;
        }
        .toolbar-row:last-child { border-bottom: none; background: #fafafa; }
        .toolbar-label { font-size: 12px; font-weight: 700; color: #777; text-transform: uppercase; width: 100%; text-align: center; margin-bottom: 5px; }

        button { padding: 8px 10px; cursor: pointer; border: 2px solid transparent; border-radius: 6px; background: #f0f4f8; font-size: 12px; font-weight: 600; color: #444; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
        button:hover { background: #e2e8f0; border-color: #cbd5e1; }
        button.active { background: var(--sys-orange-light); color: var(--sys-orange); border-color: var(--sys-orange); }
        button.active-erase { background: #ffe6e6 !important; color: #dc3545 !important; border-color: #dc3545 !important; }
        button.btn-action { background: #fff; border: 1px solid #ccc; }
        button.btn-action:hover { background: #f9f9f9; }
        
        button#btn-novo-projeto { background: var(--sys-orange); border-color: var(--sys-orange); color: white; font-weight: bold; }
        button#btn-novo-projeto:hover { background: var(--sys-orange-hover); }

        #canvas-container { 
            width: 100%; max-width: 800px;
            position: relative; background-color: white; border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden;
            background-image: radial-gradient(#d0d0d0 1px, transparent 1px);
            background-size: 20px 20px; background-position: center; background-repeat: no-repeat;
            touch-action: none; /* Impede a tela de rolar enquanto o cliente desenha */
        }
        
        canvas { 
            display: block; 
            cursor: crosshair; 
            width: 100%; /* Adapta para caber no celular */
            height: auto; 
            touch-action: none; 
        }
    </style>
</head>
<body>

    <div id="setup-modal">
        <div class="modal-content">
            <img src="/logo-footer.svg" style="filter: invert(1); height: 40px;" alt="Sys3 Telecom">
            <h3>Simulador de Cobertura</h3>
            <p>Escolha um ponto de partida para analisar o sinal Wi-Fi no ambiente.</p>
            
            <div class="modal-actions">
                <button class="btn-large btn-primary" onclick="gerarPlantaRealista()">🏚️ Carregar Planta Padrão</button>
                <button class="btn-large btn-secondary" onclick="abrirUploadPlanta()">📂 Fazer Upload da Planta</button>
            </div>
        </div>
    </div>
    
    <div id="toolbar">
        <div class="toolbar-row">
            <input type="file" id="upload-planta" accept="image/*" style="display: none;">
            <button class="btn-action" id="btn-novo-projeto" title="Abre as opções iniciais">⚙️ Novo</button>
            <button class="btn-action" id="btn-exportar" onclick="exportarImagem()" style="color: #198754; font-weight: bold;">📥 Salvar</button>
            
            <button class="tool-btn active" data-tool="router">📡 Router</button>
            <button class="tool-btn" data-tool="move" title="Mover itens">✋ Mover</button>
            <button class="tool-btn" data-tool="erase" title="Apagar itens">🧽 Apagar</button>
            
            <button class="btn-action" id="btn-undo">↩️ Desfazer</button>
            <button class="btn-action" id="btn-clear" style="color: #dc3545;">🗑️ Limpar</button>
        </div>

        <div class="toolbar-row">
            <span class="toolbar-label">Estruturas (Arrastar o dedo/mouse)</span>
            <button class="tool-btn" data-tool="wall-alvenaria">🧱 Alvenaria</button>
            <button class="tool-btn" data-tool="wall-madeira">🚪 Madeira</button>
            <button class="tool-btn" data-tool="wall-vidro">🪟 Vidro</button>
            <button class="tool-btn" data-tool="wall-ceramica">🚽 Cerâmica</button>
        </div>

        <div class="toolbar-row">
            <span class="toolbar-label">Objetos (Clicar/Tocar)</span>
            <button class="tool-btn" data-tool="obj-tv">📺 TV</button>
            <button class="tool-btn" data-tool="obj-geladeira">🧊 Geladeira</button>
            <button class="tool-btn" data-tool="obj-microondas">📻 Micro</button>
            <button class="tool-btn" data-tool="obj-espelho">🪞 Espelho</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="planta" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('planta');
        const ctx = canvas.getContext('2d');
        const scaleFactor = 4; 
        const heatmapCanvas = document.createElement('canvas');
        heatmapCanvas.width = canvas.width / scaleFactor;
        heatmapCanvas.height = canvas.height / scaleFactor;
        const heatmapCtx = heatmapCanvas.getContext('2d');

        let router = null;
        let historicoAcoes = []; 
        let currentTool = 'router'; 
        let isDrawingWall = false;
        let currentWall = null;
        let dragItem = null;
        
        let bgImageObject = null;

        const catalogo = {
            'alvenaria': { atenuacao: 150, cor: '#555555', nome: 'Alvenaria' },
            'madeira':   { atenuacao: 60,  cor: '#8B4513', nome: 'Madeira' },
            'vidro':     { atenuacao: 40,  cor: '#87CEFA', nome: 'Vidro' },
            'ceramica':  { atenuacao: 250, cor: '#4682B4', nome: 'Cerâmica' },
            'tv':         { atenuacao: 350, cor: '#2F4F4F', icone: '📺', size: 36 },
            'geladeira':  { atenuacao: 500, cor: '#B0C4DE', icone: '🧊', size: 36 },
            'microondas': { atenuacao: 750, cor: '#8B008B', icone: '📻', size: 36 },
            'espelho':    { atenuacao: 600, cor: '#A9A9A9', icone: '🪞', size: 36 }
        };

        document.getElementById('btn-novo-projeto').onclick = () => {
            document.getElementById('setup-modal').style.display = 'flex';
        };

        function abrirUploadPlanta() {
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('upload-planta').click();
        }

        document.getElementById('upload-planta').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                historicoAcoes = []; 
                router = null;       
                const img = new Image();
                img.onload = function() {
                    bgImageObject = img;
                    const container = document.getElementById('canvas-container');
                    container.style.backgroundImage = `url(${event.target.result})`;
                    container.style.backgroundSize = 'contain';
                    draw(); 
                }
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function exportarImagem() {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const eCtx = exportCanvas.getContext('2d');

            eCtx.fillStyle = '#ffffff';
            eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            if (bgImageObject) {
                const scale = Math.min(exportCanvas.width / bgImageObject.width, exportCanvas.height / bgImageObject.height);
                const w = bgImageObject.width * scale;
                const h = bgImageObject.height * scale;
                const x = (exportCanvas.width - w) / 2;
                const y = (exportCanvas.height - h) / 2;
                eCtx.drawImage(bgImageObject, x, y, w, h);
            } else {
                eCtx.fillStyle = '#d0d0d0';
                for (let x = 0; x < exportCanvas.width; x += 20) {
                    for (let y = 0; y < exportCanvas.height; y += 20) {
                        eCtx.beginPath();
                        eCtx.arc(x, y, 1, 0, Math.PI * 2);
                        eCtx.fill();
                    }
                }
            }

            eCtx.drawImage(canvas, 0, 0);

            eCtx.font = 'bold 16px sans-serif';
            eCtx.textAlign = 'right';
            const text = 'Simulação - Sys3 Telecom';
            const textWidth = eCtx.measureText(text).width;
            eCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            eCtx.beginPath();
            eCtx.roundRect(exportCanvas.width - textWidth - 25, exportCanvas.height - 35, textWidth + 20, 30, 6);
            eCtx.fill();
            
            eCtx.fillStyle = '#f26522'; 
            eCtx.fillText(text, exportCanvas.width - 15, exportCanvas.height - 15);

            const link = document.createElement('a');
            link.download = 'sys3-cobertura-wifi.png';
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }

        function gerarPlantaRealista() {
            historicoAcoes = [];
            bgImageObject = null;
            document.getElementById('canvas-container').style.backgroundImage = 'radial-gradient(#d0d0d0 1px, transparent 1px)';
            
            historicoAcoes = [
                { type: 'wall', data: { x1: 100, y1: 100, x2: 600, y2: 100, material: 'alvenaria' } }, 
                { type: 'wall', data: { x1: 100, y1: 100, x2: 100, y2: 350, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 100, y1: 350, x2: 100, y2: 450, material: 'vidro' } }, 
                { type: 'wall', data: { x1: 100, y1: 450, x2: 100, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 600, y1: 100, x2: 600, y2: 150, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 600, y1: 150, x2: 600, y2: 230, material: 'vidro' } }, 
                { type: 'wall', data: { x1: 600, y1: 230, x2: 600, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 600, y1: 500, x2: 500, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 500, y1: 500, x2: 400, y2: 500, material: 'vidro' } }, 
                { type: 'wall', data: { x1: 400, y1: 500, x2: 340, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 340, y1: 500, x2: 260, y2: 500, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 260, y1: 500, x2: 100, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 260, y1: 100, x2: 260, y2: 280, material: 'ceramica' } }, 
                { type: 'wall', data: { x1: 360, y1: 100, x2: 360, y2: 280, material: 'alvenaria' } }, 
                { type: 'wall', data: { x1: 340, y1: 360, x2: 340, y2: 500, material: 'alvenaria' } }, 
                { type: 'wall', data: { x1: 100, y1: 280, x2: 140, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 140, y1: 280, x2: 200, y2: 280, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 200, y1: 280, x2: 260, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 260, y1: 280, x2: 280, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 280, y1: 280, x2: 340, y2: 280, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 340, y1: 280, x2: 360, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 360, y1: 280, x2: 380, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 380, y1: 280, x2: 440, y2: 280, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 440, y1: 280, x2: 600, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 340, y1: 360, x2: 360, y2: 360, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 360, y1: 360, x2: 440, y2: 360, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 440, y1: 360, x2: 600, y2: 360, material: 'alvenaria' } },

                { type: 'label', data: { x: 180, y: 190, text: 'COZINHA' } },
                { type: 'object', data: { x: 230, y: 250, material: 'geladeira', size: 36 } },
                { type: 'object', data: { x: 150, y: 130, material: 'microondas', size: 36 } },
                { type: 'label', data: { x: 310, y: 190, text: 'WC' } },
                { type: 'object', data: { x: 310, y: 130, material: 'espelho', size: 36 } },
                { type: 'label', data: { x: 480, y: 190, text: 'QUARTO 1' } },
                { type: 'label', data: { x: 470, y: 430, text: 'QUARTO 2' } },
                { type: 'label', data: { x: 220, y: 390, text: 'SALA' } },
                { type: 'object', data: { x: 120, y: 390, material: 'tv', size: 36 } },
            ];

            router = { x: 310, y: 320 };
            document.getElementById('setup-modal').style.display = 'none';
            draw();
        }

        function updateCursor() {
            if (currentTool === 'move') canvas.style.cursor = dragItem ? 'grabbing' : 'grab';
            else if (currentTool === 'erase') canvas.style.cursor = 'cell';
            else canvas.style.cursor = 'crosshair';
        }

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.tool-btn').forEach(b => {
                    b.classList.remove('active'); b.classList.remove('active-erase');
                });
                if (this.dataset.tool === 'erase') this.classList.add('active-erase');
                else this.classList.add('active');
                currentTool = this.dataset.tool;
                updateCursor();
            };
        });

        document.getElementById('btn-clear').onclick = () => {
            if (confirm('Limpar o mapa inteiro?')) { historicoAcoes = []; router = null; draw(); }
        };

        document.getElementById('btn-undo').onclick = () => {
            if (historicoAcoes.length > 0) { historicoAcoes.pop(); draw(); }
        };

        function ccw(ax, ay, bx, by, cx, cy) { return (cy - ay) * (bx - ax) > (by - ay) * (cx - ax); }
        function intersects(ax, ay, bx, by, cx, cy, dx, dy) {
            return ccw(ax, ay, cx, cy, dx, dy) !== ccw(bx, by, cx, cy, dx, dy) && ccw(ax, ay, bx, by, cx, cy) !== ccw(ax, ay, bx, by, dx, dy);
        }
        function rayIntersectsObject(rx, ry, tx, ty, obj) {
            const half = obj.size / 2;
            return intersects(rx, ry, tx, ty, obj.x-half, obj.y-half, obj.x+half, obj.y-half) ||   
                   intersects(rx, ry, tx, ty, obj.x+half, obj.y-half, obj.x+half, obj.y+half) || 
                   intersects(rx, ry, tx, ty, obj.x-half, obj.y+half, obj.x+half, obj.y+half) || 
                   intersects(rx, ry, tx, ty, obj.x-half, obj.y-half, obj.x-half, obj.y+half);      
        }

        function distToSegmentSquared(p, v, w) {
            let l2 = (v.x - w.x)*(v.x - w.x) + (v.y - w.y)*(v.y - w.y);
            if (l2 === 0) return (p.x - v.x)*(p.x - v.x) + (p.y - v.y)*(p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))*(p.x - (v.x + t * (w.x - v.x))) + (p.y - (v.y + t * (w.y - v.y)))*(p.y - (v.y + t * (w.y - v.y)));
        }

        function getClickedItem(mouseX, mouseY) {
            if (router && Math.hypot(mouseX - router.x, mouseY - router.y) <= 24) return { type: 'router', target: router };
            ctx.font = 'bold 14px sans-serif';
            for (let i = historicoAcoes.length - 1; i >= 0; i--) {
                const item = historicoAcoes[i];
                if (item.type === 'object') {
                    const half = item.data.size / 2;
                    if (mouseX >= item.data.x - half && mouseX <= item.data.x + half && mouseY >= item.data.y - half && mouseY <= item.data.y + half) {
                        return { type: 'item', index: i, target: item.data, isWall: false, isLabel: false };
                    }
                } else if (item.type === 'wall') {
                    const distSq = distToSegmentSquared({x: mouseX, y: mouseY}, {x: item.data.x1, y: item.data.y1}, {x: item.data.x2, y: item.data.y2});
                    if (distSq <= 64) return { type: 'item', index: i, target: item.data, isWall: true, isLabel: false };
                }
            }
            return null;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (router) generateAndDrawHeatmap();
            drawElements();
            if (router) drawRouterIcon(); 
        }

        function generateAndDrawHeatmap() {
            const maxDist = 500;
            heatmapCtx.clearRect(0, 0, heatmapCanvas.width, heatmapCanvas.height);
            for (let hx = 0; hx < heatmapCanvas.width; hx++) {
                for (let hy = 0; hy < heatmapCanvas.height; hy++) {
                    const worldX = hx * scaleFactor; const worldY = hy * scaleFactor;
                    const dx = worldX - router.x; const dy = worldY - router.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    let totalAtenuacao = 0;
                    
                    for (let item of historicoAcoes) {
                        if (item.type === 'wall') {
                            if (intersects(router.x, router.y, worldX, worldY, item.data.x1, item.data.y1, item.data.x2, item.data.y2)) totalAtenuacao += catalogo[item.data.material].atenuacao;
                        } else if (item.type === 'object') {
                            if (rayIntersectsObject(router.x, router.y, worldX, worldY, item.data)) totalAtenuacao += catalogo[item.data.material].atenuacao;
                        }
                    }
                    const effectiveDistance = distance + totalAtenuacao;
                    if (effectiveDistance < maxDist) {
                        const intensity = 1 - (effectiveDistance / maxDist);
                        let r, g, b;
                        if (intensity > 0.6) { r = Math.floor(255 * (1 - intensity) * 2.5); g = 255; b = 0; } 
                        else if (intensity > 0.3) { r = 255; g = Math.floor(255 * ((intensity - 0.3) / 0.3)); b = 0; } 
                        else { r = 255; g = 0; b = 0; }
                        heatmapCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${intensity * 0.85})`;
                        heatmapCtx.fillRect(hx, hy, 1, 1);
                    }
                }
            }
            ctx.drawImage(heatmapCanvas, 0, 0, canvas.width, canvas.height);
        }

        function drawRouterIcon() {
            ctx.beginPath(); ctx.arc(router.x, router.y, 24, 0, Math.PI * 2); ctx.fillStyle = 'rgba(242, 101, 34, 0.2)'; ctx.fill();
            ctx.beginPath(); ctx.arc(router.x, router.y, 14, 0, Math.PI * 2); ctx.fillStyle = 'rgba(242, 101, 34, 0.4)'; ctx.fill();
            ctx.fillStyle = '#1f1f1f'; ctx.fillRect(router.x - 14, router.y - 6, 28, 12);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.moveTo(router.x - 10, router.y - 6); ctx.lineTo(router.x - 14, router.y - 16); 
            ctx.moveTo(router.x + 10, router.y - 6); ctx.lineTo(router.x + 14, router.y - 16); ctx.stroke();
            ctx.fillStyle = '#00ff00'; ctx.fillRect(router.x - 10, router.y - 2, 3, 3);
            ctx.fillStyle = '#f26522'; ctx.fillRect(router.x - 2, router.y - 2, 3, 3);
            ctx.fillStyle = '#f26522'; ctx.fillRect(router.x + 6, router.y - 2, 3, 3);
        }

        function drawElements() {
            ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let item of historicoAcoes) {
                if (item.type === 'wall') {
                    const w = item.data; ctx.strokeStyle = catalogo[w.material].cor;
                    ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();

                    const dist = Math.hypot(w.x2 - w.x1, w.y2 - w.y1);
                    if (dist > 30) { 
                        const mx = (w.x1 + w.x2) / 2; const my = (w.y1 + w.y2) / 2;
                        const nome = catalogo[w.material].nome;
                        ctx.font = 'bold 10px sans-serif';
                        const textWidth = ctx.measureText(nome).width;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.beginPath(); ctx.roundRect(mx - (textWidth/2) - 4, my - 8, textWidth + 8, 16, 4); ctx.fill();
                        ctx.strokeStyle = catalogo[w.material].cor; ctx.lineWidth = 1; ctx.stroke();
                        ctx.fillStyle = '#333';  ctx.fillText(nome, mx, my + 1);
                        ctx.lineWidth = 6; 
                    }
                } 
                else if (item.type === 'object') {
                    const obj = item.data; const info = catalogo[obj.material]; const half = info.size / 2;
                    ctx.fillStyle = info.cor; ctx.beginPath(); ctx.roundRect(obj.x - half, obj.y - half, info.size, info.size, 6); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '22px sans-serif'; ctx.fillText(info.icone, obj.x, obj.y + 2);
                }
                else if (item.type === 'label') {
                    ctx.font = 'bold 14px sans-serif'; const textWidth = ctx.measureText(item.data.text).width;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    ctx.beginPath(); ctx.roundRect(item.data.x - textWidth/2 - 8, item.data.y - 12, textWidth + 16, 24, 6); ctx.fill();
                    ctx.fillStyle = '#111'; ctx.fillText(item.data.text, item.data.x, item.data.y + 1);
                }
            }
            if (currentWall && currentTool.startsWith('wall-')) {
                const material = currentTool.split('-')[1]; ctx.strokeStyle = catalogo[material].cor;
                ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.moveTo(currentWall.x1, currentWall.y1); ctx.lineTo(currentWall.x2, currentWall.y2); ctx.stroke(); ctx.globalAlpha = 1.0; 
            }
        }

        // --- SISTEMA DE COORDENADAS PARA CELULAR (TOUCH) E MOUSE ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let evt = e;
            if (e.touches && e.touches.length > 0) { evt = e.touches[0]; }
            else if (e.changedTouches && e.changedTouches.length > 0) { evt = e.changedTouches[0]; }
            
            // Aqui está a matemática que arruma o clique se a tela encolher!
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function onInteractStart(e) {
            if (e.type === 'mousedown' && e.button !== 0) return;
            const pos = getPos(e);
            const mouseX = pos.x; const mouseY = pos.y;

            if (currentTool === 'router') { router = { x: mouseX, y: mouseY }; draw(); } 
            else if (currentTool === 'move') {
                const hit = getClickedItem(mouseX, mouseY);
                if (hit) {
                    dragItem = hit; updateCursor();
                    if (hit.isWall) {
                        dragItem.offX1 = hit.target.x1 - mouseX; dragItem.offY1 = hit.target.y1 - mouseY;
                        dragItem.offX2 = hit.target.x2 - mouseX; dragItem.offY2 = hit.target.y2 - mouseY;
                    } else { dragItem.offX = hit.target.x - mouseX; dragItem.offY = hit.target.y - mouseY; }
                }
            }
            else if (currentTool === 'erase') {
                const hit = getClickedItem(mouseX, mouseY);
                if (hit) {
                    if (hit.type === 'router') router = null; else historicoAcoes.splice(hit.index, 1);
                    draw();
                }
            }
            else if (currentTool.startsWith('wall-')) {
                isDrawingWall = true; currentWall = { x1: mouseX, y1: mouseY, x2: mouseX, y2: mouseY, material: currentTool.split('-')[1] };
            }
            else if (currentTool.startsWith('obj-')) {
                const material = currentTool.split('-')[1];
                historicoAcoes.push({ type: 'object', data: { x: mouseX, y: mouseY, material: material, size: catalogo[material].size } }); draw();
            }
        }

        function onInteractMove(e) {
            if (e.type === 'touchmove') e.preventDefault(); 
            const pos = getPos(e);
            const mouseX = pos.x; const mouseY = pos.y;

            if (isDrawingWall && currentWall) { currentWall.x2 = mouseX; currentWall.y2 = mouseY; draw(); }
            else if (dragItem && currentTool === 'move') {
                if (dragItem.isWall) {
                    dragItem.target.x1 = mouseX + dragItem.offX1; dragItem.target.y1 = mouseY + dragItem.offY1;
                    dragItem.target.x2 = mouseX + dragItem.offX2; dragItem.target.y2 = mouseY + dragItem.offY2;
                } else { dragItem.target.x = mouseX + dragItem.offX; dragItem.target.y = mouseY + dragItem.offY; }
                draw(); 
            }
        }

        function onInteractEnd(e) {
            if (isDrawingWall && currentWall) {
                isDrawingWall = false;
                const dist = Math.sqrt(Math.pow(currentWall.x2 - currentWall.x1, 2) + Math.pow(currentWall.y2 - currentWall.y1, 2));
                if (dist > 5) historicoAcoes.push({ type: 'wall', data: currentWall });
                currentWall = null; draw();
            }
            if (dragItem) { dragItem = null; updateCursor(); draw(); }
        }

        // --- LIGANDO OS EVENTOS DE MOUSE E TOQUE (CELULAR) ---
        canvas.addEventListener('mousedown', onInteractStart);
        canvas.addEventListener('touchstart', onInteractStart, { passive: false });
        
        canvas.addEventListener('mousemove', onInteractMove);
        canvas.addEventListener('touchmove', onInteractMove, { passive: false });
        
        canvas.addEventListener('mouseup', onInteractEnd);
        canvas.addEventListener('touchend', onInteractEnd);
        
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        window.onload = () => document.getElementById('setup-modal').style.display = 'flex';
    </script>
</body>
</html>
