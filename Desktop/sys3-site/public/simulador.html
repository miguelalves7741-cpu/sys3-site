<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Wi-Fi - Sys3 Telecom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { sysOrange: '#E84818', sysDark: '#0a0a0a', sysBorder: '#333333' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: transparent; color: white; overflow-x: hidden; touch-action: none; }
        
        /* Custom Scrollbar for tools */
        .hide-scroll::-webkit-scrollbar { height: 4px; }
        .hide-scroll::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #E84818; border-radius: 4px; }

        /* Canvas Grid LIGHT MODE (Fundo Branco para a planta) */
        #canvas-wrapper { overflow: auto; max-width: 100%; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); background-color: #ffffff;}
        #canvas-container { 
            position: relative; background-color: #ffffff; 
            background-image: radial-gradient(#d0d0d0 1px, transparent 1px);
            background-size: 20px 20px; background-position: center; 
        }
        canvas { display: block; cursor: crosshair; touch-action: none; }

        /* Active Tool State */
        .tool-btn { transition: all 0.2s; }
        .tool-btn.active { background: rgba(232, 72, 24, 0.15); border-color: #E84818; color: #E84818; }
        .tool-btn.active-erase { background: rgba(220, 38, 38, 0.15); border-color: #dc2626; color: #ef4444; }

        /* Modal Blur */
        #setup-modal { backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-2 md:p-6 flex flex-col items-center min-h-screen">

    <div id="setup-modal" class="fixed inset-0 bg-black/80 flex justify-center items-center z-50 p-4">
        <div class="bg-[#0a0a0a] border border-sysBorder p-8 rounded-2xl w-full max-w-md shadow-[0_0_50px_rgba(232,72,24,0.3)] text-center relative overflow-hidden">
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-sysOrange rounded-full blur-[80px] opacity-30 pointer-events-none"></div>
            <h3 class="text-3xl font-black uppercase tracking-tight text-white mb-2">Simulador <span class="text-sysOrange">Wi-Fi</span></h3>
            <p class="text-[#D2D2D2] text-sm mb-6 leading-relaxed">Desenhe suas paredes ou use uma planta base para ver como o sinal se comporta.</p>
            
            <div class="mb-6 text-left relative z-10">
                <label class="block text-[#D2D2D2] text-xs font-bold mb-3 uppercase tracking-wide text-center">Quantos Roteadores (Mesh) você precisa?</label>
                <div class="flex gap-2" id="router-qty-selector">
                    <button class="qty-btn flex-1 py-3 rounded-xl border-2 border-sysOrange bg-sysOrange/20 text-white font-black transition-all" data-val="1">1</button>
                    <button class="qty-btn flex-1 py-3 rounded-xl border border-sysBorder bg-[#1a1a1a] text-[#D2D2D2] font-bold hover:border-sysOrange/50 transition-all" data-val="2">2</button>
                    <button class="qty-btn flex-1 py-3 rounded-xl border border-sysBorder bg-[#1a1a1a] text-[#D2D2D2] font-bold hover:border-sysOrange/50 transition-all" data-val="3">3</button>
                </div>
            </div>

            <div class="flex flex-col gap-4 relative z-10">
                <button onclick="gerarPlantaRealista()" class="w-full py-4 rounded-xl bg-gradient-to-r from-sysOrange to-[#EB6410] text-white font-bold text-sm uppercase tracking-wide hover:scale-105 transition-transform shadow-lg flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Usar Planta Padrão
                </button>
                <button onclick="abrirUploadPlanta()" class="w-full py-4 rounded-xl bg-[#1a1a1a] border border-sysBorder text-[#D2D2D2] font-bold text-sm uppercase tracking-wide hover:text-white hover:border-sysOrange transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    Upload da Minha Planta
                </button>
            </div>
        </div>
    </div>
    
    <div id="toolbar" class="w-full max-w-4xl mb-4 bg-[#0a0a0a]/80 backdrop-blur-md border border-sysBorder rounded-2xl p-2 flex flex-col gap-2 shadow-xl">
        <input type="file" id="upload-planta" accept="image/*" class="hidden">
        
        <div class="flex items-center justify-between pb-2 border-b border-white/5 px-2">
            <div class="flex gap-2">
                <button id="btn-novo-projeto" class="bg-sysOrange text-white px-3 py-1.5 rounded-lg text-xs font-bold uppercase hover:bg-orange-600 transition-colors">Novo</button>
                <button onclick="exportarImagem()" class="bg-[#1a1a1a] border border-sysBorder text-green-400 px-3 py-1.5 rounded-lg text-xs font-bold uppercase hover:border-green-400 transition-colors">Salvar</button>
            </div>
            <div class="flex gap-2 text-xs text-sysOrange font-bold flex items-center" id="contador-roteadores">
                Roteadores: 0/1
            </div>
            <div class="flex gap-2">
                <button id="btn-undo" class="text-[#D2D2D2] hover:text-white text-xs px-2 py-1">↩️ Desfazer</button>
                <button id="btn-clear" class="text-red-400 hover:text-red-300 text-xs px-2 py-1">🗑️ Limpar</button>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto hide-scroll pb-1 px-2 items-center">
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest min-w-max mr-2">Ferramentas:</span>
            <button class="tool-btn active min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="router">📡 Roteador</button>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="move">✋ Mover</button>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="erase">🧽 Apagar</button>
            
            <div class="w-px h-6 bg-sysBorder mx-1"></div>
            
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest min-w-max mx-2">Paredes:</span>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="wall-alvenaria">🧱 Alvenaria</button>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="wall-madeira">🚪 Madeira</button>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="wall-vidro">🪟 Vidro</button>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="wall-ceramica">🚽 Cerâmica</button>

            <div class="w-px h-6 bg-sysBorder mx-1"></div>
            
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest min-w-max mx-2">Objetos:</span>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="obj-tv">📺 TV</button>
            <button class="tool-btn min-w-max px-3 py-2 rounded-lg border border-sysBorder bg-[#1a1a1a] text-sm font-medium text-gray-300" data-tool="obj-geladeira">🧊 Geladeira</button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container">
            <canvas id="planta" width="800" height="600"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('planta');
        const ctx = canvas.getContext('2d');
        const scaleFactor = 4; 
        const heatmapCanvas = document.createElement('canvas');
        heatmapCanvas.width = canvas.width / scaleFactor;
        heatmapCanvas.height = canvas.height / scaleFactor;
        const heatmapCtx = heatmapCanvas.getContext('2d');

        let routers = []; let historicoAcoes = []; let currentTool = 'router'; 
        let isDrawingWall = false; let currentWall = null; let dragItem = null; let bgImageObject = null;
        let maxRouters = 1; // Variável de controle de quantidade

        // Cores restauradas para Fundo Branco (Light Mode)
        const catalogo = {
            'alvenaria': { atenuacao: 150, cor: '#555555', nome: 'Alvenaria' },
            'madeira':   { atenuacao: 60,  cor: '#8B4513', nome: 'Madeira' },
            'vidro':     { atenuacao: 40,  cor: '#87CEFA', nome: 'Vidro' },
            'ceramica':  { atenuacao: 250, cor: '#4682B4', nome: 'Cerâmica' },
            'tv':        { atenuacao: 350, cor: '#2F4F4F', icone: '📺', size: 36 },
            'geladeira': { atenuacao: 500, cor: '#B0C4DE', icone: '🧊', size: 36 },
            'microondas':{ atenuacao: 750, cor: '#8B008B', icone: '📻', size: 36 },
            'espelho':   { atenuacao: 600, cor: '#A9A9A9', icone: '🪞', size: 36 }
        };

        // Lógica dos Botões de Seleção de Quantidade
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.qty-btn').forEach(b => {
                    b.className = 'qty-btn flex-1 py-3 rounded-xl border border-sysBorder bg-[#1a1a1a] text-[#D2D2D2] font-bold hover:border-sysOrange/50 transition-all';
                });
                this.className = 'qty-btn flex-1 py-3 rounded-xl border-2 border-sysOrange bg-sysOrange/20 text-white font-black transition-all';
                maxRouters = parseInt(this.dataset.val);
                atualizarContadorUI();
            }
        });

        function atualizarContadorUI() {
            document.getElementById('contador-roteadores').innerText = `Roteadores: ${routers.length}/${maxRouters}`;
        }

        document.getElementById('btn-novo-projeto').onclick = () => document.getElementById('setup-modal').style.display = 'flex';
        function abrirUploadPlanta() { document.getElementById('setup-modal').style.display = 'none'; document.getElementById('upload-planta').click(); }

        document.getElementById('upload-planta').onchange = function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                historicoAcoes = []; routers = [];      
                const img = new Image();
                img.onload = function() {
                    bgImageObject = img;
                    const container = document.getElementById('canvas-container');
                    container.style.backgroundImage = `url(${event.target.result})`;
                    container.style.backgroundSize = 'contain';
                    container.style.backgroundRepeat = 'no-repeat';
                    draw(); 
                }
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function exportarImagem() {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width; exportCanvas.height = canvas.height;
            const eCtx = exportCanvas.getContext('2d');
            eCtx.fillStyle = '#ffffff'; eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height); // Fundo branco na exportação
            if (bgImageObject) {
                const scale = Math.min(exportCanvas.width / bgImageObject.width, exportCanvas.height / bgImageObject.height);
                const w = bgImageObject.width * scale; const h = bgImageObject.height * scale;
                const x = (exportCanvas.width - w) / 2; const y = (exportCanvas.height - h) / 2;
                eCtx.drawImage(bgImageObject, x, y, w, h);
            } else {
                eCtx.fillStyle = '#d0d0d0'; // Pontinhos cinzas
                for (let x = 0; x < exportCanvas.width; x += 20) {
                    for (let y = 0; y < exportCanvas.height; y += 20) {
                        eCtx.beginPath(); eCtx.arc(x, y, 1, 0, Math.PI * 2); eCtx.fill();
                    }
                }
            }
            eCtx.drawImage(canvas, 0, 0);
            eCtx.font = 'bold 16px sans-serif'; eCtx.textAlign = 'right';
            const text = 'Simulação - Sys3 Telecom';
            const textWidth = eCtx.measureText(text).width;
            eCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            eCtx.beginPath(); eCtx.roundRect(exportCanvas.width - textWidth - 25, exportCanvas.height - 35, textWidth + 20, 30, 6); eCtx.fill();
            eCtx.fillStyle = '#E84818'; eCtx.fillText(text, exportCanvas.width - 15, exportCanvas.height - 15);
            const link = document.createElement('a');
            link.download = 'sys3-cobertura.png'; link.href = exportCanvas.toDataURL('image/png'); link.click();
        }

      function gerarPlantaRealista() {
            historicoAcoes = []; bgImageObject = null; 
            document.getElementById('canvas-container').style.backgroundImage = 'radial-gradient(#d0d0d0 1px, transparent 1px)';
            
            historicoAcoes = [
                // Bordas Externas
                { type: 'wall', data: { x1: 100, y1: 100, x2: 600, y2: 100, material: 'alvenaria' } }, 
                { type: 'wall', data: { x1: 100, y1: 100, x2: 100, y2: 350, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 100, y1: 350, x2: 100, y2: 450, material: 'vidro' } }, 
                { type: 'wall', data: { x1: 100, y1: 450, x2: 100, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 600, y1: 100, x2: 600, y2: 150, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 600, y1: 150, x2: 600, y2: 230, material: 'vidro' } }, 
                { type: 'wall', data: { x1: 600, y1: 230, x2: 600, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 600, y1: 500, x2: 500, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 500, y1: 500, x2: 400, y2: 500, material: 'vidro' } }, 
                { type: 'wall', data: { x1: 400, y1: 500, x2: 340, y2: 500, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 340, y1: 500, x2: 260, y2: 500, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 260, y1: 500, x2: 100, y2: 500, material: 'alvenaria' } },

                // Paredes Verticais Internas
                { type: 'wall', data: { x1: 260, y1: 100, x2: 260, y2: 280, material: 'ceramica' } }, 
                { type: 'wall', data: { x1: 360, y1: 100, x2: 360, y2: 280, material: 'alvenaria' } }, 
                { type: 'wall', data: { x1: 340, y1: 360, x2: 340, y2: 500, material: 'alvenaria' } }, 

                // Paredes Horizontais (Divisa Sala/Cozinha e Corredor) - AS QUE EU TINHA APAGADO!
                { type: 'wall', data: { x1: 100, y1: 280, x2: 140, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 140, y1: 280, x2: 200, y2: 280, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 200, y1: 280, x2: 260, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 260, y1: 280, x2: 280, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 280, y1: 280, x2: 340, y2: 280, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 340, y1: 280, x2: 360, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 360, y1: 280, x2: 380, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 380, y1: 280, x2: 440, y2: 280, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 440, y1: 280, x2: 600, y2: 280, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 340, y1: 360, x2: 360, y2: 360, material: 'alvenaria' } },
                { type: 'wall', data: { x1: 360, y1: 360, x2: 440, y2: 360, material: 'madeira' } }, 
                { type: 'wall', data: { x1: 440, y1: 360, x2: 600, y2: 360, material: 'alvenaria' } },

                // Labels e Objetos (Móveis)
                { type: 'label', data: { x: 180, y: 190, text: 'COZINHA' } },
                { type: 'object', data: { x: 230, y: 250, material: 'geladeira', size: 36 } },
                { type: 'object', data: { x: 150, y: 130, material: 'microondas', size: 36 } },
                { type: 'label', data: { x: 310, y: 190, text: 'WC' } },
                { type: 'object', data: { x: 310, y: 130, material: 'espelho', size: 36 } },
                { type: 'label', data: { x: 480, y: 190, text: 'QUARTO 1' } },
                { type: 'label', data: { x: 470, y: 430, text: 'QUARTO 2' } },
                { type: 'label', data: { x: 220, y: 390, text: 'SALA DE ESTAR' } },
                { type: 'object', data: { x: 120, y: 390, material: 'tv', size: 36 } },
            ];
            routers = [{ x: 310, y: 320 }]; 
            document.getElementById('setup-modal').style.display = 'none'; draw();
        }

        // --- MATEMÁTICA E ATENUAÇÃO ---
        function ccw(ax, ay, bx, by, cx, cy) { return (cy - ay) * (bx - ax) > (by - ay) * (cx - ax); }
        function intersects(ax, ay, bx, by, cx, cy, dx, dy) { return ccw(ax, ay, cx, cy, dx, dy) !== ccw(bx, by, cx, cy, dx, dy) && ccw(ax, ay, bx, by, cx, cy) !== ccw(ax, ay, bx, by, dx, dy); }
        function rayIntersectsObject(rx, ry, tx, ty, obj) {
            const half = obj.size / 2;
            return intersects(rx, ry, tx, ty, obj.x-half, obj.y-half, obj.x+half, obj.y-half) || intersects(rx, ry, tx, ty, obj.x+half, obj.y-half, obj.x+half, obj.y+half) || intersects(rx, ry, tx, ty, obj.x-half, obj.y+half, obj.x+half, obj.y+half) || intersects(rx, ry, tx, ty, obj.x-half, obj.y-half, obj.x-half, obj.y+half);      
        }
        function distToSegmentSquared(p, v, w) {
            let l2 = (v.x - w.x)*(v.x - w.x) + (v.y - w.y)*(v.y - w.y);
            if (l2 === 0) return (p.x - v.x)*(p.x - v.x) + (p.y - v.y)*(p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x)))*(p.x - (v.x + t * (w.x - v.x))) + (p.y - (v.y + t * (w.y - v.y)))*(p.y - (v.y + t * (w.y - v.y)));
        }

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.tool-btn').forEach(b => { b.classList.remove('active'); b.classList.remove('active-erase'); });
                if (this.dataset.tool === 'erase') this.classList.add('active-erase'); else this.classList.add('active');
                currentTool = this.dataset.tool;
            };
        });

        document.getElementById('btn-clear').onclick = () => { if (confirm('Limpar o mapa inteiro?')) { historicoAcoes = []; routers = []; draw(); } };
        document.getElementById('btn-undo').onclick = () => { if (historicoAcoes.length > 0) { historicoAcoes.pop(); draw(); } };

        function getClickedItem(mouseX, mouseY) {
            for (let i = 0; i < routers.length; i++) { if (Math.hypot(mouseX - routers[i].x, mouseY - routers[i].y) <= 24) return { type: 'router', index: i, target: routers[i] }; }
            for (let i = historicoAcoes.length - 1; i >= 0; i--) {
                const item = historicoAcoes[i];
                if (item.type === 'object') {
                    const half = item.data.size / 2; if (mouseX >= item.data.x - half && mouseX <= item.data.x + half && mouseY >= item.data.y - half && mouseY <= item.data.y + half) return { type: 'item', index: i, target: item.data, isWall: false, isLabel: false };
                } else if (item.type === 'wall') {
                    const distSq = distToSegmentSquared({x: mouseX, y: mouseY}, {x: item.data.x1, y: item.data.y1}, {x: item.data.x2, y: item.data.y2});
                    if (distSq <= 64) return { type: 'item', index: i, target: item.data, isWall: true, isLabel: false };
                }
            }
            return null;
        }

        function generateAndDrawHeatmap() {
            const maxDist = 500; heatmapCtx.clearRect(0, 0, heatmapCanvas.width, heatmapCanvas.height);
            for (let hx = 0; hx < heatmapCanvas.width; hx++) {
                for (let hy = 0; hy < heatmapCanvas.height; hy++) {
                    const worldX = hx * scaleFactor; const worldY = hy * scaleFactor; let bestIntensity = 0;
                    for (let r of routers) {
                        const distance = Math.sqrt((worldX - r.x)*(worldX - r.x) + (worldY - r.y)*(worldY - r.y)); let totalAtenuacao = 0;
                        for (let item of historicoAcoes) {
                            if (item.type === 'wall') { if (intersects(r.x, r.y, worldX, worldY, item.data.x1, item.data.y1, item.data.x2, item.data.y2)) totalAtenuacao += catalogo[item.data.material].atenuacao; } 
                            else if (item.type === 'object') { if (rayIntersectsObject(r.x, r.y, worldX, worldY, item.data)) totalAtenuacao += catalogo[item.data.material].atenuacao; }
                        }
                        const effectiveDistance = distance + totalAtenuacao;
                        if (effectiveDistance < maxDist) { const intensity = 1 - (effectiveDistance / maxDist); if (intensity > bestIntensity) bestIntensity = intensity; }
                    }
                    if (bestIntensity > 0) {
                        let r, g, b;
                        if (bestIntensity > 0.6) { r = Math.floor(255 * (1 - bestIntensity) * 2.5); g = 255; b = 0; } 
                        else if (bestIntensity > 0.3) { r = 255; g = Math.floor(255 * ((bestIntensity - 0.3) / 0.3)); b = 0; } 
                        else { r = 255; g = 0; b = 0; }
                        heatmapCtx.fillStyle = `rgba(${r}, ${g}, ${b}, ${bestIntensity * 0.85})`; heatmapCtx.fillRect(hx, hy, 1, 1);
                    }
                }
            }
            ctx.drawImage(heatmapCanvas, 0, 0, canvas.width, canvas.height);
        }

        function drawRouterIcons() {
            for (let r of routers) {
                ctx.beginPath(); ctx.arc(r.x, r.y, 24, 0, Math.PI * 2); ctx.fillStyle = 'rgba(232, 72, 24, 0.2)'; ctx.fill();
                ctx.beginPath(); ctx.arc(r.x, r.y, 14, 0, Math.PI * 2); ctx.fillStyle = 'rgba(232, 72, 24, 0.4)'; ctx.fill();
                ctx.fillStyle = '#111'; ctx.fillRect(r.x - 14, r.y - 6, 28, 12);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.beginPath();
                ctx.moveTo(r.x - 10, r.y - 6); ctx.lineTo(r.x - 14, r.y - 16); ctx.moveTo(r.x + 10, r.y - 6); ctx.lineTo(r.x + 14, r.y - 16); ctx.stroke();
                ctx.fillStyle = '#00ff00'; ctx.fillRect(r.x - 10, r.y - 2, 3, 3);
            }
        }

        function drawElements() {
            ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let item of historicoAcoes) {
                if (item.type === 'wall') {
                    const w = item.data; ctx.strokeStyle = catalogo[w.material].cor;
                    ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
                } else if (item.type === 'object') {
                    const obj = item.data; const info = catalogo[obj.material]; const half = info.size / 2;
                    ctx.fillStyle = info.cor; ctx.beginPath(); ctx.roundRect(obj.x - half, obj.y - half, info.size, info.size, 6); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '22px sans-serif'; ctx.fillText(info.icone, obj.x, obj.y + 2);
                } else if (item.type === 'label') {
                    ctx.font = 'bold 14px sans-serif'; const textWidth = ctx.measureText(item.data.text).width;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.beginPath(); ctx.roundRect(item.data.x - textWidth/2 - 8, item.data.y - 12, textWidth + 16, 24, 6); ctx.fill();
                    ctx.fillStyle = '#111'; ctx.fillText(item.data.text, item.data.x, item.data.y + 1); // Texto escuro para contrastar no branco
                }
            }
            if (currentWall && currentTool.startsWith('wall-')) {
                const material = currentTool.split('-')[1]; ctx.strokeStyle = catalogo[material].cor;
                ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.moveTo(currentWall.x1, currentWall.y1); ctx.lineTo(currentWall.x2, currentWall.y2); ctx.stroke(); ctx.globalAlpha = 1.0; 
            }
        }

        function draw() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            if (routers.length > 0) generateAndDrawHeatmap(); 
            drawElements(); drawRouterIcons(); 
            atualizarContadorUI();
        }

        // --- SISTEMA HÍBRIDO DE MOUSE E TOUCH ---
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            if (e.touches && e.touches.length > 0) { return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY }; }
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }

        function handleStart(e) {
            if (!e.touches && e.button !== 0) return;
            const pos = getCoordinates(e); const mouseX = pos.x; const mouseY = pos.y;
            
            if (currentTool === 'router') { 
                // AQUI ESTÁ A TRAVA DE SEGURANÇA DOS ROTEADORES!
                if (routers.length >= maxRouters) {
                    alert(`Você selecionou o limite de ${maxRouters} roteador(es). Use a ferramenta "Apagar" para remover um, ou inicie um "Novo" projeto.`);
                    return;
                }
                routers.push({ x: mouseX, y: mouseY }); draw(); 
            } 
            else if (currentTool === 'move') {
                const hit = getClickedItem(mouseX, mouseY);
                if (hit) {
                    dragItem = hit; 
                    if (hit.isWall) {
                        dragItem.offX1 = hit.target.x1 - mouseX; dragItem.offY1 = hit.target.y1 - mouseY;
                        dragItem.offX2 = hit.target.x2 - mouseX; dragItem.offY2 = hit.target.y2 - mouseY;
                    } else { dragItem.offX = hit.target.x - mouseX; dragItem.offY = hit.target.y - mouseY; }
                }
            }
            else if (currentTool === 'erase') {
                const hit = getClickedItem(mouseX, mouseY);
                if (hit) { if (hit.type === 'router') routers.splice(hit.index, 1); else historicoAcoes.splice(hit.index, 1); draw(); }
            }
            else if (currentTool.startsWith('wall-')) { isDrawingWall = true; currentWall = { x1: mouseX, y1: mouseY, x2: mouseX, y2: mouseY, material: currentTool.split('-')[1] }; }
            else if (currentTool.startsWith('obj-')) { const material = currentTool.split('-')[1]; historicoAcoes.push({ type: 'object', data: { x: mouseX, y: mouseY, material: material, size: catalogo[material].size } }); draw(); }
        }

        function handleMove(e) {
            if(isDrawingWall || dragItem) e.preventDefault();
            const pos = getCoordinates(e); const mouseX = pos.x; const mouseY = pos.y;
            if (isDrawingWall && currentWall) { currentWall.x2 = mouseX; currentWall.y2 = mouseY; draw(); }
            else if (dragItem && currentTool === 'move') {
                if (dragItem.isWall) {
                    dragItem.target.x1 = mouseX + dragItem.offX1; dragItem.target.y1 = mouseY + dragItem.offY1;
                    dragItem.target.x2 = mouseX + dragItem.offX2; dragItem.target.y2 = mouseY + dragItem.offY2;
                } else { dragItem.target.x = mouseX + dragItem.offX; dragItem.target.y = mouseY + dragItem.offY; }
                draw(); 
            }
        }

        function handleEnd(e) {
            if (isDrawingWall && currentWall) {
                isDrawingWall = false;
                const dist = Math.sqrt(Math.pow(currentWall.x2 - currentWall.x1, 2) + Math.pow(currentWall.y2 - currentWall.y1, 2));
                if (dist > 5) historicoAcoes.push({ type: 'wall', data: currentWall });
                currentWall = null; draw();
            }
            if (dragItem) { dragItem = null; draw(); }
        }

        canvas.addEventListener('mousedown', handleStart); canvas.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, {passive: false}); canvas.addEventListener('touchmove', handleMove, {passive: false}); window.addEventListener('touchend', handleEnd);
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        window.onload = () => document.getElementById('setup-modal').style.display = 'flex';
    </script>
</body>
